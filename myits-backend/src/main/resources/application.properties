spring.application.name=myits-backend
spring.config.import=optional:file:.env[.properties]

# Server
server.port=8080

# H2 File Database (persistent)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/myitsdb;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# H2 Console
spring.h2.console.enabled=true

# Hibernate / JPA Config
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# JWT
jwt.secret=${JWT_SECRET:change-this-to-a-very-long-random-secret-key-for-myits-backend-auth}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.org.springdoc=DEBUG

# OTP & SMS Gateway
otp.debug.return-otp-for-testing=${OTP_DEBUG_RETURN_OTP_FOR_TESTING:false}
otp.sms.provider=${OTP_SMS_PROVIDER:MOCK}
otp.sms.twilio.account-sid=${OTP_SMS_TWILIO_ACCOUNT_SID:}
otp.sms.twilio.auth-token=${OTP_SMS_TWILIO_AUTH_TOKEN:}
otp.sms.twilio.from-number=${OTP_SMS_TWILIO_FROM_NUMBER:}
otp.validity-ms=${OTP_VALIDITY_MS:300000}
otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
otp.resend-cooldown-ms=${OTP_RESEND_COOLDOWN_MS:30000}

# AI Attendance Prediction Service
ai.attendance.service.url=${AI_ATTENDANCE_SERVICE_URL:http://localhost:8001/predict-attendance}

# AI Chatbot Service
ai.chatbot.service.url=${AI_CHATBOT_SERVICE_URL:http://localhost:8001/chatbot/ask}

# AI Academic Performance Analyzer Service
ai.performance.service.url=${AI_PERFORMANCE_SERVICE_URL:http://localhost:8001/analyze-performance}
